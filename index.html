<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Thomas Uhr</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #F0E68C; /* Khaki */
            color: #000000; /* Schwarz */
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Wenn das Handy hochkant gehalten wird, erzwingen wir die Drehung */
        @media (orientation: portrait) {
            #container {
                transform: rotate(90deg);
                width: 100vh;
                height: 100vw;
            }
        }

        #clock {
            /* 40vh ist der "Sweet Spot", damit es riesig ist, aber nicht umbricht */
            font-size: 40vh; 
            font-weight: 900;
            line-height: 1;
            white-space: nowrap; /* Verhindert das Übereinanderstapeln der Zahlen */
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="clock">--:--</div>
    </div>
    <script>
        function update() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
