<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Thomas Uhr XL</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #F0E68C; /* Khaki */
            color: #000000; /* Schwarz */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Automatisches Drehen bei Hochformat */
        @media (orientation: portrait) {
            #container {
                transform: rotate(90deg);
                width: 100vh;
                height: 100vw;
            }
        }

        #clock {
            /* Extrem große Schrift: 48% der verfügbaren Höhe im Querformat */
            font-size: 48vh; 
            font-weight: 900;
            line-height: 1;
            text-align: center;
            white-space: nowrap;
            letter-spacing: -0.05em; /* Ziffern rücken etwas enger zusammen */
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="clock">--:--</div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = hours + ':' + minutes;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
